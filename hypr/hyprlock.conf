$font = JetBrains Mono

general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = easeOut, 0.25, 0.1, 0.25, 1
    bezier = easeInOut, 0.65, 0.0, 0.35, 1.0

    animation = fadeIn, 1, 6, easeOut
    animation = fadeOut, 1, 6, easeOut
    animation = inputFieldDots, 1, 3, easeInOut
    animation = inputFieldFade, 1, 6, easeOut
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 10
    brightness = 0.45
    vibrancy = 0.2
    vibrancy_darkness = 0.0
    contrast = 0.9
}

label {
    monitor =
    text = <span font_weight="400">$TIME</span>
    font_size = 100
    font_family = $font
    color = rgb(205, 214, 244)

    position = 0, 160
    halign = center
    valign = center

    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.5)
    shadow_boost = 1.5
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 28
    font_family = $font
    color = rgb(147, 153, 178)

    position = 0, 85
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)
    shadow_boost = 1.3
}

input-field {
    monitor =
    size = 360, 58
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    inner_color = rgba(30, 30, 46, 0.6)
    outer_color = rgb(137, 180, 250) rgb(203, 166, 247) 45deg
    check_color = rgb(166, 227, 161) rgb(137, 180, 250) 120deg
    fail_color = rgb(243, 139, 168) rgb(250, 179, 135) 40deg
    font_color = rgb(205, 214, 244)
    fade_on_empty = true
    fade_timeout = 3000
    rounding = 16
    font_family = $font
    placeholder_text = Password
    fail_text = $PAMFAIL

    position = 0, -10
    halign = center
    valign = center

    shadow_passes = 3
    shadow_size = 12
    shadow_color = rgba(0, 0, 0, 0.4)
    shadow_boost = 1.0
}

label {
    monitor =
    text = $LAYOUT[en,ru]
    font_size = 14
    font_family = $font
    color = rgb(86, 92, 120)

    position = 0, -85
    halign = center
    valign = center

    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.4)
    shadow_boost = 1.0
}
