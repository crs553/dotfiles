# Mozilla
env = MOZ_ENABLE_WAYLAND,1

env = HYPRCURSOR_THEME,catppuccin-mocha-sky-cursors
env = HYPRCURSOR_SIZE,24

env = GTK_THEME,catppuccin-mocha-mauve-standard+default

# GTK Scaling
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1

# Qt Scaling (e.g., OBS, Kdenlive)
env = QT_SCALE_FACTOR,1.5
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# Java/Electron Scaling (e.g., VS Code Flatpaks)
env = CLUTTER_SCALE,1.5

xwayland {
  force_zero_scaling = true
}
