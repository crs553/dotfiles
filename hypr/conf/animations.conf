animations {
    enabled = yes

    # Premium bezier curves
    #
    # easeOutQuint: Smooth, strong deceleration (very polished)
    # emphasizedDecel: Material Design 3 - starts fast, ends slow (premium feel)
    # almostLinear: Subtle, refined (for quick fades)
    # quick: Starts extremely fast (for responsive exits)
    # overshoot: Tiny bounce (macOS-like fun)

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1
    bezier = overshoot, 0.05, 0.9, 0.1, 1.1

    # Windows - popin style is extremely satisfying
    # 85% start zoom = noticeable but not exaggerated
    animation = windows, 1, 3, emphasizedDecel
    animation = windowsIn, 1, 3, emphasizedDecel, popin 85%
    animation = windowsOut, 1, 2, quick, popin 90%

    # Window movement - snappy but smooth
    animation = windowsMove, 1, 2.5, easeOutQuint, slide

    # Workspaces - slidefade with 20% travel = subtle, classy movement
    # Not too much motion, just enough to feel responsive
    animation = workspaces, 1, 3, easeOutQuint, slidefade 20%
    animation = workspacesIn, 1, 2.5, easeOutQuint, slidefade 20%
    animation = workspacesOut, 1, 3, easeOutQuint, slidefade 20%

    # Special workspace (scratchpad) - vertical slide
    animation = specialWorkspace, 1, 3, emphasizedDecel, slidevert 25%
    animation = specialWorkspaceIn, 1, 2.5, emphasizedDecel, slidevert 25%
    animation = specialWorkspaceOut, 1, 2, quick, slidevert 25%

    # Layers (launchers, notifications, waybar)
    animation = layers, 1, 3, emphasizedDecel
    animation = layersIn, 1, 2.5, emphasizedDecel, popin 90%
    animation = layersOut, 1, 1.5, quick, popin 95%

    # Fades - refined and quick
    animation = fade, 1, 2.5, almostLinear
    animation = fadeIn, 1, 2, almostLinear
    animation = fadeOut, 1, 1.5, almostLinear

    # Layer fades
    animation = fadeLayersIn, 1, 1.5, almostLinear
    animation = fadeLayersOut, 1, 1.5, almostLinear

    # Borders - slower for smooth color transitions
    animation = border, 1, 5, easeOutQuint

    # Remove borderangle (the bounce animation was probably annoying)
    # If you want it back, use: animation = borderangle, 1, 30, linear, loop
}
