# See https://wiki.hypr.land/Configuring/Window-Rules/ for more

# === SUPPRESSED EVENTS ===
windowrule = suppress_event maximize, match:class .*
windowrule = suppress_event fullscreen, match:class org\.oe-f\.

# === WORKSPACE RULES ===

# Terminal (WS 1)
windowrule = workspace 1, match:class kitty
windowrule = workspace 1, match:class terminator

# Browsers (WS 2)
windowrule = workspace 2, match:class org\.mozilla\.firefox
windowrule = workspace 2, match:class firefox
windowrule = workspace 2, match:class brave-browser
windowrule = workspace 2, match:class Mullvad\ Browser
windowrule = workspace 2, match:class org\.qutebrowser\.qutebrowser

# Development (WS 3)
windowrule = workspace 3, match:class bruno
windowrule = workspace 3, match:class codium-url-handler
windowrule = workspace 3, match:class code
windowrule = workspace 3, match:class codium

# File Managers (WS 4)
windowrule = workspace 4, match:class org\.gnome\.Nautilus
windowrule = workspace 4, match:class org\.kde\.dolphin
windowrule = workspace 4, match:class nemo
windowrule = workspace 4, match:class yazi
windowrule = workspace 4, match:class thunar

# Communication (WS 5)
windowrule = workspace 5, match:class signal
windowrule = workspace 5, match:class Signal
windowrule = workspace 5, match:class org\.signal\.Signal
windowrule = workspace 5, match:class discord
windowrule = workspace 5, match:class Slack
windowrule = workspace 5, match:class telegram-desktop
windowrule = workspace 5, match:class Element
windowrule = workspace 5, match:class ferdi

# Notes & Office (WS 6)
windowrule = workspace 6, match:class obsidian
windowrule = workspace 6, match:class @joplin/app-desktop
windowrule = workspace 6, match:class ONLYOFFICE
windowrule = workspace 6, match:class org\.oe-f\.
windowrule = workspace 6, match:initial_title Excalidraw
windowrule = workspace 6, match:initial_title Vikunja

# Media (WS 7)
windowrule = workspace 7, match:class Spotify
windowrule = workspace 7, match:class vlc
windowrule = workspace 7, match:class mpv
windowrule = workspace 7, match:title Navidrome

# === FLOATING APP RULES ===
windowrule = float on, match:class blueman-manager
windowrule = size 35% 45%, match:class blueman-manager
windowrule = center on, match:class blueman-manager
windowrule = float on, match:class \.blueman-manager-wrapped
windowrule = size 35% 45%, match:class \.blueman-manager-wrapped
windowrule = center on, match:class \.blueman-manager-wrapped
windowrule = float on, match:class org\.pulseaudio\.pavucontrol
windowrule = size 35% 45%, match:class org\.pulseaudio\.pavucontrol
windowrule = center on, match:class org\.pulseaudio\.pavucontrol

# === BROWSER PICTURE-IN-PICTURE ===
windowrule = keep_aspect_ratio on, match:title Picture(-| )in(-| )[Pp]icture
windowrule = move 73% 72%, match:title Picture(-| )in(-| )[Pp]icture
windowrule = size 25% 25%, match:title Picture(-| )in(-| )[Pp]icture
windowrule = float on, match:title Picture(-| )in(-| )[Pp]icture
windowrule = pin on, match:title Picture(-| )in(-| )[Pp]icture

# === DIALOG WINDOWS ===
windowrule = float on, match:class hyprpolkitagent
windowrule = size 35% 35%, match:class hyprpolkitagent
windowrule = center on, match:class hyprpolkitagent

windowrule = float on, match:title Media\ viewer
windowrule = size 45% 55%, match:title Media\ viewer
windowrule = center on, match:title Media\ viewer

windowrule = float on, match:title Volume\ Control
windowrule = size 35% 45%, match:title Volume\ Control
windowrule = center on, match:title Volume\ Control

windowrule = float on, match:title Picture-in-Picture

windowrule = float on, match:class Viewnior
windowrule = size 50% 60%, match:class Viewnior
windowrule = center on, match:class Viewnior

windowrule = float on, match:title DevTools
windowrule = size 45% 50%, match:title DevTools
windowrule = center on, match:title DevTools

windowrule = float on, match:class file_progress
windowrule = float on, match:class confirm
windowrule = float on, match:class dialog
windowrule = float on, match:class download
windowrule = float on, match:class notification
windowrule = float on, match:class error
windowrule = float on, match:class confirmreset
windowrule = float on, match:title Open\ File
windowrule = float on, match:title branchdialog
windowrule = float on, match:title Confirm\ to\ replace\ files
windowrule = float on, match:title File\ Operation\ Progress
