# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# === SUPPRESSED EVENTS ===
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = suppressevent fullscreen, class:^(org\.oe-f\.)$

# === WORKSPACE RULES ===

# Terminal (WS 1)
windowrulev2 = workspace 1, class:^(kitty)$
windowrulev2 = workspace 1, class:^(terminator)$

# Browsers (WS 2)
windowrulev2 = workspace 2, class:^(org.mozilla.firefox)$
windowrulev2 = workspace 2, class:^(firefox)$
windowrulev2 = workspace 2, class:^(brave-browser)$
windowrulev2 = workspace 2, class:^(Mullvad Browser)$
windowrulev2 = workspace 2, class:^(org.qutebrowser.qutebrowser)$

# Development (WS 3)
windowrulev2 = workspace 3, class:^(bruno)$
windowrulev2 = workspace 3, class:^(codium-url-handler)$
windowrulev2 = workspace 3, class:^(code)$
windowrulev2 = workspace 3, class:^(codium)$

# File Managers (WS 4)
windowrulev2 = workspace 4, class:^(org.gnome.Nautilus)$
windowrulev2 = workspace 4, class:^(org.kde.dolphin)$
windowrulev2 = workspace 4, class:^(nemo)$
windowrulev2 = workspace 4, class:^(yazi)$
windowrulev2 = workspace 4, class:^(thunar)$

# Communication (WS 5)
windowrulev2 = workspace 5, class:^(signal)$
windowrulev2 = workspace 5, class:^(Signal)$
windowrulev2 = workspace 5, class:^(org.signal.Signal)$
windowrulev2 = workspace 5, class:^(discord)$
windowrulev2 = workspace 5, class:^(Slack)$
windowrulev2 = workspace 5, class:^(telegram-desktop)$
windowrulev2 = workspace 5, class:^(Element)$
windowrulev2 = workspace 5, class:^(ferdi)$

# Notes & Office (WS 6)
windowrulev2 = workspace 6, class:^(obsidian)$
windowrulev2 = workspace 6, class:^(@joplin/app-desktop)$
windowrulev2 = workspace 6, class:^(ONLYOFFICE)$
windowrulev2 = workspace 6, class:^(org\.oe-f\.)$

# Media (WS 7)
windowrulev2 = workspace 7, class:^(Spotify)$
windowrulev2 = workspace 7, class:^(vlc)$
windowrulev2 = workspace 7, class:^(mpv)$

# === FLOATING APP RULES ===
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = size 35% 45%, class:^(blueman-manager)$
windowrulev2 = center, class:^(blueman-manager)$
windowrulev2 = float, class:^(.blueman-manager-wrapped)$
windowrulev2 = size 35% 45%, class:^(.blueman-manager-wrapped)$
windowrulev2 = center, class:^(.blueman-manager-wrapped)$
windowrulev2 = float, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = size 35% 45%, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = center, class:^(org.pulseaudio.pavucontrol)$

# === BROWSER PICTURE-IN-PICTURE ===
windowrulev2 = keepaspectratio, title:^(Picture(-| )in(-| )[Pp]icture)$
windowrulev2 = move 73% 72%, title:^(Picture(-| )in(-| )[Pp]icture)$
windowrulev2 = size 25%, title:^(Picture(-| )in(-| )[Pp]icture)$
windowrulev2 = float, title:^(Picture(-| )in(-| )[Pp]icture)$
windowrulev2 = pin, title:^(Picture(-| )in(-| )[Pp]icture)$

# === DIALOG WINDOWS ===
windowrulev2 = float, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrulev2 = size 35% 35%, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrulev2 = center, class:^(org.kde.polkit-kde-authentication-agent-1)$

windowrulev2 = float, title:^(Media viewer)$
windowrulev2 = size 45% 55%, title:^(Media viewer)$
windowrulev2 = center, title:^(Media viewer)$

windowrulev2 = float, title:^(Volume Control)$
windowrulev2 = size 35% 45%, title:^(Volume Control)$
windowrulev2 = center, title:^(Volume Control)$

windowrulev2 = float, title:^(Picture-in-Picture)$

windowrulev2 = float, class:^(Viewnior)$
windowrulev2 = size 50% 60%, class:^(Viewnior)$
windowrulev2 = center, class:^(Viewnior)$

windowrulev2 = float, title:^(DevTools)$
windowrulev2 = size 45% 50%, title:^(DevTools)$
windowrulev2 = center, title:^(DevTools)$

windowrulev2 = float, class:^(file_progress)$
windowrulev2 = float, class:^(confirm)$
windowrulev2 = float, class:^(dialog)$
windowrulev2 = float, class:^(download)$
windowrulev2 = float, class:^(notification)$
windowrulev2 = float, class:^(error)$
windowrulev2 = float, class:^(confirmreset)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(branchdialog)$
windowrulev2 = float, title:^(Confirm to replace files)$
windowrulev2 = float, title:^(File Operation Progress)$
