#/auto~/.zshrc

# ------------------------------
# 2️⃣ Aliases
# ------------------------------
alias tmux="tmux a || tmux"
alias pd="pushd"
alias pp="popd"
alias cd="z"

# ------------------------------
# 3️⃣ Starship prompt
# ------------------------------
eval "$(starship init zsh)"

# ------------------------------
# 4️⃣ Zoxide (directory jumping)
# ------------------------------
eval "$(zoxide init zsh)"

# ------------------------------
# 5️⃣ Environment variables
# ------------------------------
export CHROME_PATH="/run/current-system/sw/bin/brave"
export PATH="$HOME/.cargo/bin:$PATH"

# ------------------------------
# 6️⃣ Optional: zsh options for convenience
# ------------------------------
# Enable extended globbing (useful for some zoxide completions)
setopt extendedglob
# Case-insensitive completion
zstyle ':completion:*' matcher-list 'm:{a-z}={A-Z}'

# ------------------------------
# 7️⃣ Load custom scripts (if any)
# ------------------------------
# [Uncomment if you have extra scripts]
# source ~/.zsh/custom.sh

